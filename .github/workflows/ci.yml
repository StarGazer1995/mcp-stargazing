name: CI

on:
  push:
    branches:
      - main
      - dev/ci
  pull_request:
    branches:
      - main

env:
  UV_VERSION: "0.6"

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

  test:
    name: Docker Build and Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Test Image
        run: docker build --target test -t test-image .

      - name: Run Tests in Docker
        run: |
          mkdir -p reports
          docker run --rm -v ${{ github.workspace }}/reports:/app/reports test-image tests/ -v --junitxml=/app/reports/test-report.xml

      - name: Build Production Image
        run: docker build --target production -t prod-image .

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/test-report.xml
