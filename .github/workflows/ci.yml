name: CI

on:
  push:
    branches:
      - main
      - dev/ci
  pull_request:
    branches:
      - main

env:
  UV_VERSION: "0.6"

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends libgdal-dev

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Run bandit security check
        run: uv run bandit -c pyproject.toml -r src/

  test:
    name: Docker Build and Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Build Test Image
        run: docker build --target test -t test-image .

      - name: Run Tests in Docker
        run: |
          mkdir -p reports
          docker run --rm -v ${{ github.workspace }}/reports:/reports test-image \
            -v \
            --junitxml=/reports/test-report.xml \
            --cov=src \
            --cov-report=xml:/reports/coverage.xml

      - name: Install diff-cover
        run: python -m pip install --upgrade diff-cover

      - name: Enforce 100% diff coverage
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            COMPARE_REF="origin/$BASE_REF"
            git fetch origin "$BASE_REF" --depth=1
          else
            COMPARE_REF="$BEFORE_SHA"
          fi

          if [ -z "$COMPARE_REF" ]; then
            COMPARE_REF="origin/$DEFAULT_BRANCH"
            git fetch origin "$DEFAULT_BRANCH" --depth=1
          fi

          diff-cover reports/coverage.xml --compare-branch="$COMPARE_REF" --fail-under=100

      - name: Build Production Image
        run: docker build --target production -t prod-image .

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/test-report.xml

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/coverage.xml
